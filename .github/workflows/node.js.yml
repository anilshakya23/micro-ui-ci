name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  Security_checke:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    - name: trivy installing
      run: |
        iwr "https://github.com/aquasecurity/trivy/releases/download/v0.71.0/trivy_0.71.0_windows-64bit.zip" -OutFile "trivy.zip"
        Expand-Archive -Path "trivy_0.71.0_windows-64bit.zip" -DestinationPath ".\trivy" -Force
        .\trivy.exe version
        trivy version
        
    - name: trivy scanning
      run: trivy fs --format table -o fs-report.json
